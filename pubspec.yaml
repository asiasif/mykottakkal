name: mykottakkal
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  provider: ^6.1.5+1
  cloudinary_public: ^0.23.1
  google_fonts: ^6.3.2
  image_picker: ^1.2.1
  uuid: any
  google_sign_in: ^6.2.1
